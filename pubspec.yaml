name: seusdados
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10
  path_provider: ^2.1.1
  file_picker: ^6.1.1
  permission_handler: ^11.1.0
  provider: ^6.1.1
  intl: ^0.19.0
  http: ^1.6.0
  http_parser: ^4.0.2
  sqflite_common_ffi: ^2.3.0
  shared_preferences: ^2.2.2
  uuid: ^4.5.1
  path: ^1.9.1
  url_launcher: ^6.3.0
  archive: ^4.0.7
  syncfusion_flutter_pdf: ^32.2.3
  tray_manager: ^0.5.2
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  image: ^4.3.0

flutter_launcher_icons:
  image_path: "assets/icons/pv-pulse.png"
  windows:
    generate: true
  web:
    generate: true
  macos:
    generate: true
  linux:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/pv-pulse.png
    - assets/icons/app_icon.ico
